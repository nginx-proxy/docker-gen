name: Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "LICENSE"
      - "**.md"
      - "examples/*"
      - "templates/*"

jobs:
  unit:
    strategy:
      matrix:
        go-version:
          - "1.25"
          - "1.26"
        os:
          - macos
          - ubuntu
          - windows
      fail-fast: false

    name: Unit Tests (${{ matrix.os }}/go-${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: make get-deps

      - name: Build docker-gen
        run: make docker-gen

      - name: Check code formatting
        if: runner.os != 'Windows'
        run: make check-gofmt

      - name: Run tests
        run: make test
  
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./integration

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: "./integration/go.mod"

      - name: Install dependencies
        run: make get-deps

      - name: Build docker-gen images
        run: make build-docker-gen-images

      - name: Run tests
        run: make test
      
      - name: Cleanup docker-gen images
        if: always()
        run: make cleanup-docker-gen-images
